# Annual charity walks/runs that use Central Park as a venue but are missed by
# the four other event sources:
#
#   1. NYC Open Data (tvpp-9vvx)      — skews toward street/sidewalk permits;
#                                       large Parks-venue private bookings
#                                       like AIDS Walk don't flow through.
#   2. centralparknyc.org             — Conservancy programming only.
#   3. centralpark.com                — in-park commercial/community programming.
#   4. NYRR (nyrr-races.json)         — running races only.
#
# Each entry below is a recurring annual event. Confirm the year's date and
# update the `dates:` map each spring. Entries where the current year's date
# is null are skipped by the merge until filled.

walks:

  - id: aids-walk-ny
    title: "AIDS Walk New York"
    organizer: "GMHC"
    source_url: "https://aidswalkny.org/day-of-event/"
    recurrence: "Third Sunday of May (typical)"
    dates:
      "2026": "2026-05-17"
    start_time: "10:00"
    opening_ceremony_time: "09:15"
    end_time: "12:30"
    location: "Naumburg Bandshell"
    event_type: "Charity Walk"
    event_borough: "Manhattan"
    expected_attendance: 30000
    affects_loop: true
    route_impact: >
      Opening ceremony at Naumburg Bandshell 9:15 AM, 6.2-mile walk through
      Central Park starting 10 AM. Crowds enter from CPW, Fifth Ave, and both
      transverses. East Drive in the 60s–70s is unusable for running roughly
      9 AM – 12:30 PM.
    audience_relevance:
      - runners
      - cyclists
      - walkers
      - park-watcher
    description: >
      Annual fundraiser for GMHC (Gay Men's Health Crisis). Opening ceremony
      at the Naumburg Bandshell on the Mall, followed by a 6.2-mile route
      through Central Park. Finish-line festival on the Mall through 12:30 PM.
    tags:
      - charity
      - walk
      - affects-loop
      - annual-tradition
      - lgbtq

  - id: front-runners-pride-run
    title: "Front Runners New York LGBT Pride Run 4M"
    organizer: "Front Runners New York / New York Road Runners"
    source_url: "https://www.nyrr.org/races/frontrunnersnewyorklgbtpriderun4m"
    recurrence: "Last Saturday of June (typical)"
    dates:
      "2026": "2026-06-27"
    start_time: "08:00"
    end_time: "10:00"
    location: "Naumburg Bandshell"
    event_type: "Charity Run"
    event_borough: "Manhattan"
    expected_attendance: 6000
    affects_loop: true
    route_impact: >
      NYRR 4-mile race on the park drives, start 8:00 AM Saturday. Race-Day
      Central and number pickup (from 6:30 AM) at the Naumburg Bandshell. The
      loop (East and West Drive) carries the race field roughly 7:30–10 AM;
      run before 7:30 or after 10:30, or use the Bridle Path / Reservoir.
    audience_relevance:
      - runners
      - cyclists
      - walkers
      - park-watcher
    description: >
      Front Runners New York's annual LGBTQ+ Pride Run, a 4-mile NYRR race in
      Central Park. 2026 charity beneficiary is Housing Works.
    tags:
      - charity
      - race
      - running
      - affects-loop
      - annual-tradition
      - lgbtq

  - id: achilles-hope-possibility
    title: "Achilles Hope & Possibility 4M"
    organizer: "Achilles International / New York Road Runners (presented by TD Bank)"
    source_url: "https://www.nyrr.org/races/achilleshopepossibility4mpresentedbytdbank"
    recurrence: "Late-June Sunday (typical)"
    dates:
      "2026": "2026-06-28"
    start_time: "08:15"
    end_time: "10:30"
    location: "Naumburg Bandshell"
    event_type: "Charity Run"
    event_borough: "Manhattan"
    expected_attendance: 6000
    affects_loop: true
    route_impact: >
      NYRR / Achilles International 4-mile inclusive race, start 8:15 AM Sunday,
      with handcyclists, wounded veterans, and athletes of all abilities on the
      drives. The loop carries the field roughly 7:30–10:30 AM; run before 7:30
      or after 11, or use the Bridle Path / Reservoir.
    audience_relevance:
      - runners
      - cyclists
      - walkers
      - park-watcher
    description: >
      Achilles International's flagship Hope & Possibility 4-miler, one of the
      largest inclusive races in the U.S., operated by NYRR in Central Park.
    tags:
      - charity
      - race
      - running
      - affects-loop
      - annual-tradition

  - id: nyrr-team-championships
    title: "NYRR Team Championships 5M"
    organizer: "New York Road Runners"
    source_url: "https://events.nyrr.org/nyrr-team-championships-5m"
    recurrence: "Late-July Sunday (typical)"
    dates:
      "2026": "2026-07-26"
    start_time: "07:30"
    end_time: "10:00"
    location: "102nd Street Cross Drive"
    event_type: "Charity Run"
    event_borough: "Manhattan"
    expected_attendance: 5000
    affects_loop: true
    route_impact: >
      NYRR club-team 5-mile championship on the park drives, first wave 7:30 AM
      Sunday with staggered men's, women's, and non-binary starts through
      mid-morning. Start and finish are on the 102nd Street Cross Drive, heading
      west onto West Drive and running the lower loop. Expect the full loop to
      carry race traffic roughly 7–10 AM, with staging and breakdown on the
      north end from 6 AM. Run or ride before 6:30 or after 10:30, or use the
      Bridle Path / Reservoir.
    audience_relevance:
      - runners
      - cyclists
      - walkers
      - sports-fan
      - park-watcher
    description: >
      New York Road Runners' annual club Team Championships, a five-mile race in
      Central Park worth double points in the NYRR Club Points Series.
    tags:
      - charity
      - race
      - running
      - affects-loop
      - annual-tradition

