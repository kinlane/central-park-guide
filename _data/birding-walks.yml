# NYC Bird Alliance (formerly NYC Audubon) — recurring guided bird walks in
# Central Park.
#
# Hand-curated seed file. NYC Bird Alliance's events page renders via JS so we
# can't scrape it server-side. Most of their Central Park walks are recurring
# weekly or monthly programs; we maintain them here and emit one event per date
# in the season window.
#
# Source: https://nycbirdalliance.org/events-birding/programs-and-events/local-trips-classes
#         (open in a browser, copy the schedule each season)
#
# Each entry expands into a series of dated events. The merge script generates
# one Markdown file per occurrence between `season_start` and `season_end`,
# subject to `weekday` (0=Mon, 6=Sun) and `cadence` (weekly, monthly, biweekly).

walks:

  # Add entries like this as the schedules are published.
