privacy:
  title: "Privacy Policy"
  effective_date: "November 17th, 2025"
  sections:
    - heading: "Collection of Routine Information"
      content: "This website tracks basic information about its visitors. This information includes, but is not limited to, IP addresses, browser details, timestamps and referring pages. None of this information can personally identify specific visitors to this website. The information is tracked for routine administration and maintenance purposes."
    - heading: "Cookies"
      content: "Where necessary, this website uses cookies to store information about a visitor's preferences and history in order to better serve the visitor and/or present the visitor with customized content."
    - heading: "Advertisement and Other Third Parties"
      content: "Advertising partners and other third parties may use cookies, scripts and/or web beacons to track visitors activities on this website in order to display advertisements and other useful information. Such tracking is done directly by the third parties through their own servers and is subject to their own privacy policies."
    - heading: "Links to Third Party Websites"
      content: "We have included links on this website for your use and reference. We are not responsible for the privacy policies on these websites. You should be aware that the privacy policies of these websites may differ from our own."
    - heading: "Security"
      content: "The security of your personal information is important to us, but remember that no method of transmission over the Internet, or method of electronic storage, is 100% secure. While we strive to use commercially acceptable means to protect your personal information, we cannot guarantee its absolute security."
    - heading: "Changes To This Privacy Policy"
      content: "This Privacy Policy is effective and will remain in effect except with respect to any changes in its provisions in the future, which will be in effect immediately after being posted on this page. We reserve the right to update or change our Privacy Policy at any time and you should check this Privacy Policy periodically."
    - heading: "Contact Information"
      content: "If you have any questions or concerns regarding the privacy policy, please send us an email to info@apievangelist.com."
