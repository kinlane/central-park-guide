      image_alt: "Central Park.Guide brand"
      url: /
    - title: "The Squirrel Patrol"
      text: "Street-level magic: buskers, surprise parades, and goose uprisings. From Poppy's sidecar."
      image: /assets/images/brand-sp.avif
      image_alt: "Squirrel Patrol brand"
      url: https://poppyrlane.com

newsletter:
  heading: "Don't miss a thing"
  text: "Get weekly park alerts straight to your inbox. Closures, concerts, and the good stuff."
