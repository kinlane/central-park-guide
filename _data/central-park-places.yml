    description: Sidewalks along the western perimeter of the park.

  - name: Dairy Lawn
    type: lawn
    alternate_names:
      - Diary Lawn
    location: Southern section, near the Dairy visitor center
    description: Open lawn area adjacent to the Dairy building in the southern part of the park.

  - name: Dead Road North
    type: service road
    alternate_names:
