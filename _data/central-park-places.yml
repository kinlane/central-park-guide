      - Naumburg Bandshell
    location: Mid-park near 72nd Street, south of Bethesda Terrace
    description: Open-air performance venue and surrounding plaza. Home to concerts, dance events, and the famous roller disco.

  - name: Pilgrim Hill
    type: hill/lawn
    location: East side, near 72nd Street and Fifth Avenue
    description: Gentle hill with open lawn. Named for the Pilgrim of the Mayflower statue at its base.

  - name: Bowling Green Lawn
    type: lawn
    location: Southern section
    description: Open lawn area in the southern part of the park.

  - name: Heckscher Fields
