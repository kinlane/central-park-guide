    location: North shore of Harlem Meer, at 110th Street
    description: Environmental education center with plaza and lawn areas. Hosts community events and seasonal festivals.

  - name: East 106th Street Lawn
    type: lawn
    location: East side, near 106th Street
    description: Open lawn area in the northeastern section of the park.

  - name: East 102nd Street Landscape
    type: landscape area
