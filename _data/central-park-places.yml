  - name: Ladies' Pavilion
    type: pavilion
    location: West side of the Lake, near 75th Street
    description: Cast-iron Victorian shelter overlooking the Lake. Popular venue for ceremonies and small events.

  - name: Dene Lawn
    type: lawn
    location: East side, near 67th Street
    description: Open lawn area used for permitted events and gatherings.

  - name: Bandshell Plaza
    type: plaza/performance area
