    description: Western-themed playground with adjacent lawn.

  - name: Tarr Playground
    type: playground
    alternate_names:
      - Playground 100
    location: West side, near 100th Street
    description: Playground also known as Playground 100.

  - name: Great Hill
    type: hill/lawn
    location: Northwest section, near 106th Street
    description: Open hilltop area divided into north, south, and oval sections. Used for picnics and events.

  - name: East Meadow
    type: meadow/athletic area
    location: East side, between approximately 97th and 99th Streets
    description: Large open area with clay courts, picnic zone, and north lawn sections. Used for sports and community events.

  - name: King Jagiello Plaza
    type: plaza
