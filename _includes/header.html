<header class="site-header">
  <div class="container">
    <a href="/" class="site-header__logo">
      <img src="/assets/images/logo.png" alt="{{ site.data.site.name }}">
    </a>
    <nav class="site-header__nav" id="main-nav">
      {% for link in site.data.navigation.main %}
      <a href="{{ link.url }}" {% if page.url == link.url %}class="active"{% endif %}>{{ link.title }}</a>
      {% endfor %}
    </nav>
    <a href="{{ site.data.navigation.cta.url }}" class="btn btn-green site-header__cta">{{ site.data.navigation.cta.title }}</a>
    <button class="site-header__toggle" id="nav-toggle" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
