title: Central Park.Guide
description: "Your everyday guide to the park that never sleeps."
url: "https://centralpark.guide"
baseurl: ""

permalink: pretty

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: default

plugins:
  - jekyll-seo-tag
